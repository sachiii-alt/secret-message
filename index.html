<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Message</title>

<style>
body {
    margin: 0;
    height: 100vh;
    font-family: 'Segoe UI', sans-serif;
    overflow: hidden;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(135deg, #ff758c, #ff7eb3);
}

/* 😔 FLOATING HEART BACKGROUND */
.hearts {
    position: absolute;
    width: 100%;
    height: 100%;
    overflow: hidden;
    z-index: 0;
}

.hearts span {
    position: absolute;
    bottom: -50px;
    color: rgba(255, 255, 255, 0.6);
    font-size: 20px;
    animation: floatUp 10s linear infinite;
}

@keyframes floatUp {
    0% {
        transform: translateY(0) rotate(0deg);
        opacity: 0;
    }
    20% {
        opacity: 1;
    }
    100% {
        transform: translateY(-110vh) rotate(360deg);
        opacity: 0;
    }
}

/* random heart positions */
.hearts span:nth-child(1) { left: 10%; animation-delay: 0s; }
.hearts span:nth-child(2) { left: 20%; animation-delay: 2s; }
.hearts span:nth-child(3) { left: 35%; animation-delay: 4s; }
.hearts span:nth-child(4) { left: 50%; animation-delay: 1s; }
.hearts span:nth-child(5) { left: 65%; animation-delay: 3s; }
.hearts span:nth-child(6) { left: 80%; animation-delay: 5s; }
.hearts span:nth-child(7) { left: 90%; animation-delay: 6s; }

/* CARD */
.card {
    position: relative;
    z-index: 2;
    background: rgba(255, 255, 255, 0.15);
    padding: 50px 70px;
    border-radius: 25px;
    color: white;
    backdrop-filter: blur(12px);
    box-shadow: 0 0 40px rgba(255,255,255,0.3);
    width: 750px;
    max-width: 90vw;
    text-align: center;
}

/* hide inputs */
input {
    display: none;
}

/* buttons */
label {
    display: inline-block;
    margin-top: 20px;
    padding: 12px 22px;
    background: white;
    color: #ff4e88;
    border-radius: 25px;
    cursor: pointer;
    font-weight: bold;
    transition: 0.3s;
}

label:hover {
    background: #ff4e88;
    color: white;
}

/* screens */
.s2, .s3, .s4, .s5 {
    display: none;
}

/* flow */
#s1:checked ~ .s2 { display: block; }
#s1:checked ~ .s1 { display: none; }

#s2:checked ~ .s3 { display: block; }
#s2:checked ~ .s2 { display: none; }

#s3:checked ~ .s4 { display: block; }
#s3:checked ~ .s3 { display: none; }

#s4:checked ~ .s5 { display: block; }
#s4:checked ~ .s4 { display: none; }

/* images */
.images {
    display: flex;
    justify-content: center;
    gap: 20px;
    margin-top: 20px;
}

.images img {
    width: 180px;
    height: 180px;
    object-fit: cover;
    border-radius: 20px;
    animation: float 3s infinite ease-in-out;
    box-shadow: 0 10px 20px rgba(0,0,0,0.3);
}

@keyframes float {
    0% { transform: translateY(0); }
    50% { transform: translateY(-12px); }
    100% { transform: translateY(0); }
}

/* final screen */
.fade-in {
    opacity: 0;
    animation: fadeIn 3s ease forwards;
    text-align: left;
    line-height: 1.6;
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
}

.s5 h3 {
    margin: 0;
}
</style>

</head>
<body>

<!-- 💖 BACKGROUND HEARTS -->
<div class="hearts">
    <span>😔</span>
    <span>😓</span>
    <span>💔</span>
    <span>💔</span>
    <span>😔</span>
    <span>💔</span>
    <span>😓</span>
</div>

<div class="card">

<!-- CHECKBOXES -->
<input type="checkbox" id="s1">
<input type="checkbox" id="s2">
<input type="checkbox" id="s3">
<input type="checkbox" id="s4">

<!-- SCREEN 1 -->
<div class="s1">
    <h1>Hi</h1>
    <label for="s1">Click</label>
</div>

<!-- SCREEN 2 -->
<div class="s2">
    <h2>I lost so nothing to see here...</h2>

    <div class="images">
        <img src="pic1.jpg">
        <img src="pic2.jpg">
        <img src="pic3.jpg">
    </div>

    <label for="s2">Click</label>
</div>

<!-- SCREEN 3 -->
<div class="s3">
    <h2>ggs</h2>
    <label for="s3">ggs??</label>
</div>

<!-- SCREEN 4 -->
<div class="s4">
    <h2>Press next</h2>
    <label for="s4">next</label>
</div>

<!-- SCREEN 5 -->
<div class="s5 fade-in">
    <h3>
I lost :<
<br><br>


<br><br>

04/30/2026 | Evening

<br><br>

(╥﹏╥)
    </h3>
</div>

</div>

</body>
</html>
